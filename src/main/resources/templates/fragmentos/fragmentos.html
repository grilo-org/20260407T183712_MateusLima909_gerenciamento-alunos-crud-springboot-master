<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<body>

    <header th:fragment="cabecalho">
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top main-nav">
            <div class="container">
                <a th:href="@{/dashboard}" class="navbar-brand d-flex align-items-center">
                    <img src="/img/logo-escola.png" width="50" class="me-2 filter-white" alt="Logo"/>
                    <span class="fw-bold fs-4">Academy<span class="text-accent">Spring</span></span>
                </a>
                
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMobile">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div id="navMobile" class="navbar-collapse collapse justify-content-end">
                    <ul class="navbar-nav align-items-center">
                        <li class="nav-item">
                            <a th:href="@{/dashboard}" class="nav-link mx-2">
                                <i class="bi bi-house-door me-1"></i> Home
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-2" th:href="@{/inserir-alunos}">
                                <i class="bi bi-person-plus me-1"></i> Cadastrar
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-2" style="cursor: pointer;" 
                               data-bs-toggle="modal" data-bs-target="#modalPesquisa">
                                <i class="bi bi-search me-1"></i> Pesquisar
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-2" th:href="@{/notas-enade}">
                                <i class="bi bi-graph-up-arrow me-1"></i> Média Notas ENADE
                            </a>
                        </li>
                        <li class="nav-item ms-lg-3">
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="btn btn-logout d-flex align-items-center">
                                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div th:fragment="alertas">
        <div th:if="${message_success}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${message_success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${message_error}" class="alert alert-danger alert-dismissible fade show shadow-sm mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${message_error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <div th:fragment="modalPesquisa">
        <div class="modal fade" id="modalPesquisa" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content glass-modal shadow">
                    <div class="modal-header border-0">
                        <h5 class="modal-title fw-bold text-dark">Busca Rápida de Alunos</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form method="post" th:action="@{/pesquisar-aluno}">
                        <div class="modal-body py-4">
                            <label class="form-label text-muted small fw-bold">Digite o nome do estudante:</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-search"></i></span>
                                <input type="text" name="nome" class="form-control" placeholder="Ex: Caça Rato" required>
                            </div>
                        </div>
                        <div class="modal-footer border-0">
                            <button type="button" class="btn btn-link text-secondary text-decoration-none" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">Pesquisar Agora</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer th:fragment="rodape" class="py-4 mt-auto">
        <div class="container text-center">
            <hr class="border-secondary opacity-25">
            <p class="mb-0 text-white small opacity-75">
                &copy; 2026 Academy Spring - Refatorado por <span class="fw-bold">Mateus Lima</span>
            </p>
            <p class="text-white extra-small opacity-50">Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
