<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos Inativos | AcademySpring</title>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div th:replace="fragmentos/fragmentos :: cabecalho"></div>

    <main class="dashboard-wrapper">
        <div class="overlay"></div>
        
        <div class="container content-area">
            
            <div th:replace="fragmentos/fragmentos :: alertas"></div>
        <div class="container">
        <h3>Alunos Inativos Adicionados</h3>
        <hr>

            <div class="glass-card shadow-lg p-4 border-danger-soft">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold text-white mb-0">Estudantes Inativos</h2>
                        <p class="text-light opacity-75 small">Alunos com matrícula trancada ou cancelada</p>
                    </div>
                    <a th:href="@{/index}" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-arrow-left me-1"></i> Voltar
                    </a>
                </div>

                <div class="table-responsive">
                    <table class="table table-custom table-hover align-middle">
                        <thead>
                            <tr>
                                <th scope="col">Nome</th>
                                <th scope="col">E-mail</th>
                                <th scope="col">Curso</th>
                                <th scope="col">Matrícula</th>
                                <th scope="col">Turno</th>
                                <th scope="col" class="text-center">Status</th>
                                <th scope="col" class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(alunosInativos)}">
                                <td colspan="7" class="text-center text-white py-5 opacity-50">
                                    <i class="bi bi-person-check fs-1"></i>
                                    <p class="mt-2">Não há alunos inativos no momento. Tudo em ordem!</p>
                                </td>
                            </tr>

                            <tr th:each="alunos : ${alunosInativos}">
                                <td class="fw-bold text-white" th:text="${alunos.nome}"></td>
                                <td class="text-light opacity-75" th:text="${alunos.email}"></td>
                                <td><span class="badge bg-dark-soft" th:text="${alunos.curso}"></span></td>
                                <td class="text-accent fw-bold" th:text="${alunos.matricula}"></td>
                                <td class="text-white small" th:text="${alunos.turno}"></td>
                                <td class="text-center">
                                    <span class="badge rounded-pill bg-danger shadow-sm">INATIVO</span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group" role="group">
                                        <a class="btn btn-sm btn-outline-info me-2 border-0" th:href="@{/editar-aluno/{id}(id=${alunos.id})}" title="Editar">
                                            <i class="bi bi-pencil-square fs-5"></i>
                                        </a>
                                        <a class="btn btn-sm btn-outline-danger border-0" th:href="@{/remover-aluno/{id}(id=${alunos.id})}" 
                                           onclick="return confirm('Tem certeza que deseja remover este registro?')" title="Remover">
                                            <i class="bi bi-trash3 fs-5"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragmentos/fragmentos :: modalPesquisa"></div>

    <script src="/webjars/jquery/3.6.0/jquery.min.js"></script>
    <script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
