<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro de Alunos | AcademySpring</title>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div th:replace="fragmentos/fragmentos :: cabecalho"></div>

    <main class="dashboard-wrapper">
        <div class="overlay"></div>
        
        <div class="container content-area">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold text-white">Encontrar Alunos</h1>
                <p class="text-light opacity-75 lead">Selecione o filtro de status para visualizar a listagem</p>
            </div>

            <div class="row g-4 justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <a th:href="@{/alunos-ativos}" class="dashboard-card status-card-active shadow">
                        <div class="card-icon text-success">
                            <i class="bi bi-person-check-fill"></i>
                        </div>
                        <h3>Alunos Ativos</h3>
                        <p>Visualize todos os estudantes com matrícula regular no sistema.</p>
                        <span class="btn-action">Ver Ativos <i class="bi bi-chevron-right"></i></span>
                    </a>
                </div>

                <div class="col-md-5 col-lg-4">
                    <a th:href="@{/alunos-inativos}" class="dashboard-card status-card-inactive shadow">
                        <div class="card-icon text-danger">
                            <i class="bi bi-person-x-fill"></i>
                        </div>
                        <h3>Alunos Inativos</h3>
                        <p>Lista de estudantes com matrícula trancada ou cancelada.</p>
                        <span class="btn-action">Ver Inativos <i class="bi bi-chevron-right"></i></span>
                    </a>
                </div>
            </div>

            <div class="text-center mt-5">
                <a th:href="@{/index}" class="btn btn-link text-white text-decoration-none opacity-50">
                    <i class="bi bi-arrow-left me-1"></i> Voltar ao Painel
                </a>
            </div>
        </div>
    </main>

    <div th:replace="fragmentos/fragmentos :: modalPesquisa"></div>

    <script src="/webjars/jquery/3.6.0/jquery.min.js"></script>
    <script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
