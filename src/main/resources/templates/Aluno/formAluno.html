<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Aluno | AcademySpring</title>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div th:replace="fragmentos/fragmentos :: cabecalho"></div>

    <main class="dashboard-wrapper">
        <div class="overlay"></div>
        
        <div class="container content-area">
            
            <div th:replace="fragmentos/fragmentos :: alertas"></div>

            <div class="glass-card mx-auto shadow-lg" style="max-width: 800px;">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-white">Cadastro de Aluno</h2>
                    <p class="text-light opacity-75">Preencha as informações abaixo para registrar o estudante.</p>
                </div>

                <form method="post" th:action="@{/salvar-aluno}" th:object="${aluno}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-white small">Nome Completo</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: João da Silva" required>
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white small">E-mail Acadêmico</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="joao@email.com" required>
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white small">Curso</label>
                            <select class="form-select" th:field="*{curso}">
                                <option th:each="curso : ${T(br.com.gerenciamento.enums.Curso).values()}"
                                        th:value="${curso}" th:text="${curso}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white small">Matrícula</label>
                            <div class="input-group">
                                <input type="text" id="matricula" th:field="*{matricula}" class="form-control" placeholder="Clique em Gerar">
                                <button class="btn btn-accent" type="button" onclick="GerarMatricula();">Gerar</button>
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('matricula')}" th:errors="*{matricula}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white small">Turno</label>
                            <select class="form-select" th:field="*{turno}">
                                <option th:each="turno : ${T(br.com.gerenciamento.enums.Turno).values()}"
                                        th:value="${turno}" th:text="${turno}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white small">Status Atual</label>
                            <select class="form-select" th:field="*{status}">
                                <option th:each="status : ${T(br.com.gerenciamento.enums.Status).values()}"
                                        th:value="${status}" th:text="${status}"></option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label text-white small">Nota ENADE</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-star-fill"></i></span>
                                <input type="number" step="0.1" th:field="*{notaEnade}" class="form-control" placeholder="Nota do ENADE (Ex: 8.5)" required>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4 border-light opacity-25">

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/index}" class="btn btn-outline-light px-4">
                            <i class="bi bi-arrow-left me-2"></i> Voltar
                        </a>
                        <button type="submit" class="btn btn-main btn-lg px-5 shadow">
                            <i class="bi bi-check-lg me-2"></i> Salvar Aluno
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="fragmentos/fragmentos :: modalPesquisa"></div>

    <script src="js/main.js"></script>
    <script src="/webjars/jquery/3.6.0/jquery.min.js"></script>
    <script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
