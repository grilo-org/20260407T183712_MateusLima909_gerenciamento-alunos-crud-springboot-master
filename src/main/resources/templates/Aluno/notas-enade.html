<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas ENADE | AcademySpring</title>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div th:replace="fragmentos/fragmentos :: cabecalho"></div>

    <main class="dashboard-wrapper">
        <div class="overlay"></div>
        
        <div class="container content-area">
            
            <div th:replace="fragmentos/fragmentos :: alertas"></div>

            <div class="glass-card shadow-lg p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold text-white mb-0">Notas ENADE</h2>
                        <p class="text-light opacity-75 small">Média de desempenho dos alunos com status ATIVO</p>
                    </div>
                    <div class="text-end">
                        <span class="badge bg-accent p-2 fs-6 shadow-sm">
                            <i class="bi bi-calculator me-1"></i> 
                            Média Geral: <span th:text="${#numbers.formatDecimal(mediaAtivos, 1, 2)}">0.00</span>
                        </span>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-custom table-hover align-middle">
                        <thead>
                            <tr>
                                <th scope="col">Estudante</th>
                                <th scope="col">Curso</th>
                                <th scope="col" class="text-center">Status</th>
                                <th scope="col" class="text-center">Nota ENADE</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(alunosAtivos)}">
                                <td colspan="4" class="text-center text-white py-5 opacity-50">
                                    <i class="bi bi-clipboard-x fs-1"></i>
                                    <p class="mt-2">Não há alunos ativos para calcular médias.</p>
                                </td>
                            </tr>

                            <tr th:each="aluno : ${alunosAtivos}">
                                <td class="fw-bold text-white" th:text="${aluno.nome}"></td>
                                <td><span class="badge bg-dark-soft" th:text="${aluno.curso}"></span></td>
                                <td class="text-center">
                                    <span class="badge rounded-pill bg-success">ATIVO</span>
                                </td>
                                <td class="text-center fw-bold text-accent">
                                    <i class="bi bi-star-fill me-1 small"></i>
                                    <span th:text="${aluno.notaEnade}">0.0</span>
                                </td>
                            </tr>
                        </tbody>
                        
                        <tfoot th:if="${not #lists.isEmpty(alunosAtivos)}">
                            <tr class="border-top border-light">
                                <td colspan="3" class="text-end text-white pe-4">
                                    <strong>Média Total (Base Ativa):</strong>
                                </td>
                                <td class="text-center text-accent fw-bold fs-5">
                                    <span th:text="${#numbers.formatDecimal(mediaAtivos, 1, 2)}">0.00</span>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                
                <div class="mt-4">
                    <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-arrow-left me-1"></i> Voltar ao Painel
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragmentos/fragmentos :: modalPesquisa"></div>

    <script src="/webjars/jquery/3.6.0/jquery.min.js"></script>
    <script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
