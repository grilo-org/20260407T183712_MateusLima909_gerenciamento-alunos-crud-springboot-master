
name: Grilo SC Analysis for Java (Maven/Gradle)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: {}

jobs:
  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================================================================
      # SETUP DO AMBIENTE DE BUILD (MANTIDO IGUAL V8)
      # =========================================================================
      - name: Setup Build Environment
        id: setup_env
        run: |
          echo "🔍 Detectando sistema de build..."
          
          echo "📱 Verificando necessidade de google-services.json..."
          if grep -rq "com.google.gms.google-services" . 2>/dev/null || grep -rq "google-services" . 2>/dev/null; then
            echo "🔥 Projeto usa Firebase/Google Services"
            for app_dir in $(find . -type d -name "app"); do
              if [ ! -f "$app_dir/google-services.json" ]; then
                echo "📝 Criando google-services.json dummy em: $app_dir"
                echo "" | base64 -d > "$app_dir/google-services.json"
              fi
            done
          fi
          
          # 1. MAVEN
          POM_PATH=$(find . -maxdepth 3 -name "pom.xml" -not -path "*/target/*" | head -n 1)
          if [ -n "$POM_PATH" ]; then
            echo "✅ Maven detectado em: $POM_PATH"
            echo "build_system=maven" >> $GITHUB_OUTPUT
            echo "build_file=$POM_PATH" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 2. GRADLE
          GRADLE_FILE=$(find . -maxdepth 3 \( -name "build.gradle" -o -name "build.gradle.kts" \) -type f | head -n 1)
          if [ -n "$GRADLE_FILE" ]; then
            echo "✅ Gradle detectado em: $GRADLE_FILE"
            echo "build_system=gradle" >> $GITHUB_OUTPUT
            echo "build_file=$GRADLE_FILE" >> $GITHUB_OUTPUT
            
            PROPS=$(find . -name "gradle-wrapper.properties" -type f | head -n 1)
            TARGET_VERSION="8.10.2"
            
            if [ -f "$PROPS" ]; then
               ver=$(grep -oE 'gradle-[0-9.]+(-(bin|all))?\.zip' "$PROPS" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1)
               if [ -n "$ver" ]; then
                 TARGET_VERSION="$ver"
                 echo "✅ Versão detectada no projeto: $TARGET_VERSION"
               else
                 echo "⚠️ Versão não detectada, usando fallback: $TARGET_VERSION"
               fi
            fi
            echo "detected_gradle_ver=$TARGET_VERSION" >> $GITHUB_OUTPUT
            
            echo "⬇️ Baixando Gradle $TARGET_VERSION..."
            wget -q "https://services.gradle.org/distributions/gradle-${TARGET_VERSION}-bin.zip" || {
              echo "❌ Falha ao baixar Gradle"
              exit 0
            }
            unzip -q "gradle-${TARGET_VERSION}-bin.zip"
            echo "GRADLE_HOME=$PWD/gradle-${TARGET_VERSION}/bin" >> $GITHUB_ENV
            echo "$PWD/gradle-${TARGET_VERSION}/bin" >> $GITHUB_PATH
            echo "✅ Gradle $TARGET_VERSION instalado"
          else
             echo "⚠️ Nenhum build system detectado"
             echo "build_system=unknown" >> $GITHUB_OUTPUT
          fi

      # =========================================================================
      # DETECÇÃO DE VERSÃO DO JAVA (MANTIDO IGUAL V8)
      # =========================================================================
      - name: Detect Java Version
        id: detect_java
        shell: bash
        run: |
          DETECTED_JAVA="21"
          echo "🔍 Analisando versão do Java requerida..."
          
          if [ "${{ steps.setup_env.outputs.build_system }}" == "maven" ]; then
             POM="${{ steps.setup_env.outputs.build_file }}"
             if [ -f "$POM" ]; then
               RAW_VERSION=$(grep -E '<(java\.version|maven\.compiler\.(source|target|release))>' "$POM" | head -n 1 | awk -F'[><]' '{print $3}')
               if [ -n "$RAW_VERSION" ]; then
                 if [[ "$RAW_VERSION" == 1.* ]]; then DETECTED_JAVA=$(echo "$RAW_VERSION" | cut -d. -f2); else DETECTED_JAVA="$RAW_VERSION"; fi
                 echo "✅ Versão Java detectada no Maven: $DETECTED_JAVA"
               fi
             fi
          fi
          
          if [ "${{ steps.setup_env.outputs.build_system }}" == "gradle" ]; then
             GRADLE="${{ steps.setup_env.outputs.build_file }}"
             if [ -f "$GRADLE" ]; then
                RAW_VERSION=$(grep -oE '(JavaLanguageVersion\.of\([0-9]+\)|sourceCompatibility\s*=\s*[\"'\'']?[0-9.]+[\"'\'']?)' "$GRADLE" | grep -oE '[0-9]+(\.[0-9]+)*' | head -n 1)
                if [ -n "$RAW_VERSION" ]; then
                   if [[ "$RAW_VERSION" == 1.* ]]; then DETECTED_JAVA=$(echo "$RAW_VERSION" | cut -d. -f2); else DETECTED_JAVA="$RAW_VERSION"; fi
                   echo "✅ Versão Java detectada no Gradle: $DETECTED_JAVA"
                fi
             fi
          fi
          
          echo "🏁 Usando Java: $DETECTED_JAVA"
          echo "java_version=$DETECTED_JAVA" >> $GITHUB_OUTPUT

      # =========================================================================
      # SETUP JAVA
      # =========================================================================
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.detect_java.outputs.java_version }}
          distribution: 'temurin'

      # =========================================================================
      # MAVEN: Compila APENAS (CIRURGIA PONTUAL AQUI)
      # Antes rodava o Sonar junto e crashava no Java 8. Agora só compila.
      # =========================================================================
      - name: Maven Build
        id: maven_build
        if: steps.setup_env.outputs.build_system == 'maven'
        continue-on-error: true
        run: |
          echo "🚀 Tentando compilar com Maven..."
          if mvn -B clean package -Dmaven.test.skip=true -f ${{ steps.setup_env.outputs.build_file }}; then
              echo "✅ Build Maven concluído."
              echo "build_success=true" >> $GITHUB_OUTPUT
              
              # Localiza binários dinamicamente (igual fizemos pro Gradle)
              echo "🔍 Procurando diretórios com arquivos .class gerados..."
              BIN_DIRS=$(find . -name "*.class" -type f -exec dirname {} + | sort -u | paste -sd "," -)
              if [ -z "$BIN_DIRS" ]; then
                 mkdir -p target/dummy_classes
                 BIN_DIRS="target/dummy_classes"
              fi
              echo "bin_dirs=$BIN_DIRS" >> $GITHUB_OUTPUT
          else
              echo "⚠️ Build Maven falhou."
              echo "build_success=false" >> $GITHUB_OUTPUT
          fi

      # =========================================================================
      # GRADLE: Build e localização dinâmica (MANTIDO IGUAL V8)
      # =========================================================================
      - name: Gradle Build (Best Effort)
        if: steps.setup_env.outputs.build_system == 'gradle'
        id: gradle_build
        continue-on-error: true
        run: |
          BUILD_DIR=$(dirname "${{ steps.setup_env.outputs.build_file }}")
          cd "$BUILD_DIR"
          
          echo "🚀 Tentando compilar com Gradle..."
          BUILD_SUCCESS="false"
          
          if gradle compileDebugSources -x test -x lint --no-daemon -Dorg.gradle.java.home=$JAVA_HOME 2>/dev/null; then
            BUILD_SUCCESS="true"
          elif gradle compileKotlin -x test --no-daemon -Dorg.gradle.java.home=$JAVA_HOME 2>/dev/null; then
            BUILD_SUCCESS="true"
          elif gradle compileJava -x test --no-daemon -Dorg.gradle.java.home=$JAVA_HOME 2>/dev/null; then
            BUILD_SUCCESS="true"
          elif gradle classes -x test --no-daemon -Dorg.gradle.java.home=$JAVA_HOME 2>/dev/null; then
            BUILD_SUCCESS="true"
          else
            echo "⚠️ Build falhou, mas continuando."
          fi
          
          echo "build_success=$BUILD_SUCCESS" >> $GITHUB_OUTPUT
          
          if [ "$BUILD_SUCCESS" == "true" ]; then
             echo "🔍 Procurando diretórios com arquivos .class gerados..."
             BIN_DIRS=$(find . -name "*.class" -type f -exec dirname {} + | sort -u | paste -sd "," -)
             
             if [ -z "$BIN_DIRS" ]; then
                echo "⚠️ Nenhum .class encontrado na busca. Usando diretório fallback."
                mkdir -p build/dummy_classes
                BIN_DIRS="build/dummy_classes"
             fi
             
             echo "bin_dirs=$BIN_DIRS" >> $GITHUB_OUTPUT
             echo "✅ Diretórios de binários mapeados: $BIN_DIRS"
          fi

      # =========================================================================
      # SONAR SCAN: COM BINÁRIOS (MANTIDO LÓGICA, ADICIONADO MAVEN NA REGRA)
      # =========================================================================
      - name: SonarCloud Scan (With Binaries)
        if: (steps.setup_env.outputs.build_system == 'gradle' && steps.gradle_build.outputs.build_success == 'true') || (steps.setup_env.outputs.build_system == 'maven' && steps.maven_build.outputs.build_success == 'true')
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=grilo-org_20260407T183712_MateusLima909_gerenciamento-alunos-crud-springboot-master
            -Dsonar.projectName=20260407T183712_MateusLima909_gerenciamento-alunos-crud-springboot-master
            -Dsonar.organization=grilo-org
            -Dsonar.java.binaries=${{ steps.gradle_build.outputs.bin_dirs }},${{ steps.maven_build.outputs.bin_dirs }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*.class,**/build/**,**/gradle/**,**/target/**,.gradle/**

      # =========================================================================
      # SONAR SCAN: FALLBACK SOURCE-ONLY (MANTIDO LÓGICA, ADICIONADO MAVEN NA REGRA)
      # =========================================================================
      - name: SonarCloud Scan (Source Only)
        if: (steps.setup_env.outputs.build_system == 'gradle' && steps.gradle_build.outputs.build_success != 'true') || (steps.setup_env.outputs.build_system == 'maven' && steps.maven_build.outputs.build_success != 'true')
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=grilo-org_20260407T183712_MateusLima909_gerenciamento-alunos-crud-springboot-master
            -Dsonar.projectName=20260407T183712_MateusLima909_gerenciamento-alunos-crud-springboot-master
            -Dsonar.organization=grilo-org
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*.class,**/build/**,**/gradle/**,**/target/**,.gradle/**

      # =========================================================================
      # ANÁLISE SOURCE-ONLY (UNKNOWN) - MANTIDO
      # =========================================================================
      - name: SonarCloud Scan (Source Only - Unknown)
        if: steps.setup_env.outputs.build_system == 'unknown'
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=grilo-org_20260407T183712_MateusLima909_gerenciamento-alunos-crud-springboot-master
            -Dsonar.projectName=20260407T183712_MateusLima909_gerenciamento-alunos-crud-springboot-master
            -Dsonar.organization=grilo-org
            -Dsonar.sources=.

      # =========================================================================
      # RELATÓRIO FINAL (MANTIDO, APENAS VISUALIZAÇÃO)
      # =========================================================================
      - name: Analysis Summary
        if: always()
        run: |
          echo "============================================================"
          echo "📊 RESUMO DA ANÁLISE SONARCLOUD"
          echo "============================================================"
          echo ""
          echo "Projeto: 20260407T183712_MateusLima909_gerenciamento-alunos-crud-springboot-master"
          echo "Build System: ${{ steps.setup_env.outputs.build_system }}"
          echo "Java Version: ${{ steps.detect_java.outputs.java_version }}"
          echo ""
          # Verifica sucesso Maven OU Gradle
          if [ "${{ steps.maven_build.outputs.build_success }}" == "true" ] || [ "${{ steps.gradle_build.outputs.build_success }}" == "true" ]; then
            echo "✅ Build: SUCESSO"
            echo "   Análise completa com binários disponíveis."
          else
            echo "⚠️ Build: FALHOU ou NÃO EXECUTADO (Fallback Source-Only)"
            echo "   Algumas métricas podem estar incompletas."
          fi
          echo ""
          echo "Dashboard: https://sonarcloud.io/dashboard?id=grilo-org_20260407T183712_MateusLima909_gerenciamento-alunos-crud-springboot-master"
          echo "============================================================"
